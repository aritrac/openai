#Spring application name
spring.application.name=openai
#needed when there are multiple chat models in the same application, to avoid ambiguity
spring.ai.chat.client.enabled=true

#Custom logging
logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# check http://localhost:11434/api/tags for the current installed model

#SPRING WITH OPENAI PLATFORM INTEGRATION
spring.ai.openai.api-key=${OPENAI_API_KEY}

#h2 db config
spring.datasource.url=jdbc:h2:file:D:\\Spring_AI\\openai\\src\\main\\resources\\chatmemory;AUTO_SERVER=true
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sample_user
spring.datasource.password=sample_pass
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.docker.compose.stop.command=stop

spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=binarylife


